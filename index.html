<!DOCTYPE html>
<html>
<head>
  <title>Gameity</title>
<meta name="google-site-verification" content="RqSuASow0mKU-kxHpgYtPmKBX_C6NecOZitYGUXOaKQ" />
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f1a;
      color: white;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background: #111122;
      position: fixed;
      padding: 20px;
    }

    .content {
      margin-left: 240px;
      padding: 20px;
    }

    .card {
      background: #1e1e2f;
      border-radius: 16px;
      padding: 15px;
      margin: 10px;
    }

    button {
      background: #4f46e5;
      border: none;
      padding: 10px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin: 5px;
    }

    img.avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
  </style>
</head>

<body>

<div id="auth">
  <div class="card">
    <h2>Gameity</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="sidebar">
    <h2>Gameity</h2>
    <button onclick="loadGames()">Games</button>
    <button onclick="loadProfile()">Profile</button>
    <button onclick="loadFriends()">Friends</button>
    <button onclick="loadDMs()">DMs</button>
    <button id="adminBtn" onclick="loadAdmin()" style="display:none;">Admin</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content" id="content"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, sendEmailVerification,
  signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
  getFirestore, doc, setDoc, getDoc, updateDoc,
  collection, addDoc, getDocs, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAW1rG5UOdmsI3aSGhmSvVtH7TEZlFsK_U",
  authDomain: "watchify-4f64d.firebaseapp.com",
  projectId: "watchify-4f64d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// UI
const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");
const content = document.getElementById("content");
const adminBtn = document.getElementById("adminBtn");

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

// REGISTER
window.register = async () => {
  const username = prompt("Username?");
  const avatar = prompt("Avatar URL?");

  const user = await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);

  await sendEmailVerification(user.user);

  await setDoc(doc(db, "users", user.user.uid), {
    username,
    avatar,
    isAdmin: true // 👈 YOU ARE ADMIN
  });

  alert("Verification email sent!");
};

// LOGIN
window.login = async () => {
  await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
};

window.logout = () => signOut(auth);

// STATE
onAuthStateChanged(auth, async (user) => {
  if (user) {
    authDiv.style.display = "none";
    appDiv.style.display = "block";

    const snap = await getDoc(doc(db, "users", user.uid));
    const data = snap.data();

    if (data.isAdmin) adminBtn.style.display = "block";

    loadGames();
  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

// PROFILE
window.loadProfile = async () => {
  const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
  const data = snap.data();

  content.innerHTML = `
    <h2>Profile</h2>
    <img class="avatar" src="${data.avatar}">
    <p>${data.username}</p>
    <button onclick="changeAvatar()">Change Avatar</button>
  `;
};

window.changeAvatar = async () => {
  const url = prompt("New avatar URL?");
  await updateDoc(doc(db, "users", auth.currentUser.uid), {
    avatar: url
  });
  loadProfile();
};

// GAMES
window.loadGames = async () => {
  content.innerHTML = "<h2>Games</h2><button onclick='addGame()'>Add Game</button>";

  const snap = await getDocs(collection(db, "games"));
  snap.forEach(docSnap => {
    const g = docSnap.data();

    content.innerHTML += `
      <div class="card">
        ${g.title}
        <button onclick="joinGame('${docSnap.id}')">Join (Beta)</button>
      </div>
    `;
  });
};

window.addGame = async () => {
  const title = prompt("Game name?");
  await addDoc(collection(db, "games"), { title });
};

window.joinGame = (id) => {
  alert("Joining game (beta): " + id);
};

// DMs
window.loadDMs = () => {
  content.innerHTML = `
    <h2>DMs</h2>
    <input id="msg">
    <button onclick="sendMsg()">Send</button>
    <div id="msgs"></div>
  `;

  onSnapshot(collection(db, "messages"), (snap) => {
    const box = document.getElementById("msgs");
    box.innerHTML = "";

    snap.forEach(d => {
      box.innerHTML += `<div class="card">${d.data().text}</div>`;
    });
  });
};

window.sendMsg = async () => {
  const text = document.getElementById("msg").value;
  await addDoc(collection(db, "messages"), { text });
};

// ADMIN
window.loadAdmin = () => {
  content.innerHTML = `
    <h2>Admin Panel</h2>
    <button onclick="uploadAsset()">Upload Decal/Shirt</button>
  `;
};

window.uploadAsset = async () => {
  const url = prompt("Image URL?");
  await addDoc(collection(db, "assets"), { url });
  alert("Uploaded!");
};

</script>

</body>
</html>
