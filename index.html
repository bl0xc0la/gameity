<!DOCTYPE html>
<html>
<head>
  <title>Gameity</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: white;
    }

    h2 {
      margin-top: 0;
    }

    .card {
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      padding: 20px;
      margin: 10px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 15px 40px rgba(0,0,0,0.8);
    }

    input {
      padding: 12px;
      margin: 6px;
      border-radius: 12px;
      border: none;
      outline: none;
      width: 200px;
    }

    button {
      padding: 10px 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: white;
      cursor: pointer;
      margin: 5px;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px #6d5cff;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background: #111122;
      position: fixed;
      padding: 20px;
      box-shadow: 5px 0 20px rgba(0,0,0,0.5);
    }

    .content {
      margin-left: 240px;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
    }

    #messages {
      height: 250px;
      overflow-y: auto;
      background: #111;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .msg {
      margin: 5px 0;
      padding: 8px;
      border-radius: 10px;
      background: #222;
    }

  </style>
</head>

<body>

<div id="auth">
  <div class="card" style="width:300px;margin:100px auto;text-align:center;">
    <h2>Gameity</h2>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="sidebar">
    <h2>Gameity</h2>
    <button onclick="loadGames()">Games</button>
    <button onclick="loadFriends()">Friends</button>
    <button onclick="loadDMs()">DMs</button>
    <button id="adminBtn" onclick="loadAdmin()" style="display:none;">Admin</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content" id="content"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
  getFirestore, doc, setDoc, getDoc, updateDoc,
  arrayUnion, arrayRemove, collection, addDoc,
  getDocs, query, where, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAW1rG5UOdmsI3aSGhmSvVtH7TEZlFsK_U",
  authDomain: "watchify-4f64d.firebaseapp.com",
  projectId: "watchify-4f64d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// UI refs
const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");
const content = document.getElementById("content");
const adminBtn = document.getElementById("adminBtn");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

// AUTH
window.register = async () => {
  const username = prompt("Username?");
  const user = await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);

  await setDoc(doc(db, "users", user.user.uid), {
    username,
    friends: [],
    requests: [],
    isAdmin: false
  });
};

window.login = async () => {
  await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
};

window.logout = () => signOut(auth);

// STATE
onAuthStateChanged(auth, async (user) => {
  if (user) {
    authDiv.style.display = "none";
    appDiv.style.display = "block";

    const snap = await getDoc(doc(db, "users", user.uid));
    const data = snap.data();

    if (data && data.isAdmin) adminBtn.style.display = "block";

    loadGames();
  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

// GAMES
window.loadGames = async () => {
  content.innerHTML = "<h2>Games</h2><div class='grid' id='games'></div>";

  const gamesDiv = document.getElementById("games");
  const snapshot = await getDocs(collection(db, "games"));

  snapshot.forEach(docSnap => {
    gamesDiv.innerHTML += `<div class="card">${docSnap.data().title}</div>`;
  });
};

// FRIENDS + SEARCH
window.loadFriends = async () => {
  content.innerHTML = `
    <h2>Friends</h2>
    <input id="searchUser" placeholder="Search username">
    <button onclick="searchUser()">Search</button>
    <div id="results"></div>
    <h3>Requests</h3>
    <div id="requests"></div>
  `;

  const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
  const data = snap.data();

  const reqDiv = document.getElementById("requests");

  data.requests.forEach(uid => {
    reqDiv.innerHTML += `
      <div class="card">
        ${uid}
        <button onclick="acceptRequest('${uid}')">Accept</button>
      </div>
    `;
  });
};

window.searchUser = async () => {
  const name = document.getElementById("searchUser").value;
  const q = query(collection(db, "users"), where("username", "==", name));
  const snapshot = await getDocs(q);

  const results = document.getElementById("results");
  results.innerHTML = "";

  snapshot.forEach(docSnap => {
    const user = docSnap.data();

    results.innerHTML += `
      <div class="card">
        ${user.username}
        <button onclick="sendRequest('${docSnap.id}')">Add Friend</button>
      </div>
    `;
  });
};

window.sendRequest = async (uid) => {
  await updateDoc(doc(db, "users", uid), {
    requests: arrayUnion(auth.currentUser.uid)
  });
  alert("Request sent");
};

window.acceptRequest = async (uid) => {
  await updateDoc(doc(db, "users", auth.currentUser.uid), {
    friends: arrayUnion(uid),
    requests: arrayRemove(uid)
  });

  await updateDoc(doc(db, "users", uid), {
    friends: arrayUnion(auth.currentUser.uid)
  });

  loadFriends();
};

// DMs
let currentChat = null;

async function getOrCreateChat(uid1, uid2) {
  const q = query(collection(db, "messages"), where("participants", "array-contains", uid1));
  const snapshot = await getDocs(q);

  for (let docSnap of snapshot.docs) {
    if (docSnap.data().participants.includes(uid2)) return docSnap.id;
  }

  const newChat = await addDoc(collection(db, "messages"), {
    participants: [uid1, uid2]
  });

  return newChat.id;
}

window.loadDMs = async () => {
  const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
  const friends = snap.data().friends;

  content.innerHTML = "<h2>DMs</h2>";

  friends.forEach(uid => {
    content.innerHTML += `<button onclick="openChat('${uid}')">${uid}</button>`;
  });

  content.innerHTML += `<div id="chat"></div>`;
};

window.openChat = async (uid) => {
  currentChat = await getOrCreateChat(auth.currentUser.uid, uid);

  document.getElementById("chat").innerHTML = `
    <div id="messages"></div>
    <input id="msg">
    <button onclick="sendMessage()">Send</button>
  `;

  const msgsRef = collection(db, "messages", currentChat, "msgs");

  onSnapshot(msgsRef, (snapshot) => {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    snapshot.forEach(doc => {
      box.innerHTML += `<div class="msg">${doc.data().text}</div>`;
    });
  });
};

window.sendMessage = async () => {
  const text = document.getElementById("msg").value;

  await addDoc(collection(db, "messages", currentChat, "msgs"), {
    text,
    sender: auth.currentUser.uid,
    timestamp: Date.now()
  });
};

// ADMIN
window.loadAdmin = () => {
  content.innerHTML = `
    <h2>Admin Panel</h2>
    <button onclick="addGame()">Add Game</button>
  `;
};

window.addGame = async () => {
  const title = prompt("Game name?");
  await addDoc(collection(db, "games"), { title });
};

</script>

</body>
</html>
